<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Form</title>
  <link rel="stylesheet" href="tarjeta.css">
</head>
<body>
  <div class="card-form-container">
    <div class="card-preview">
      <div class="card-details">
        <div class="card-number">#### #### #### ####</div>
        <div class="card-holder">
          <span>Card Holder:</span>
          <span class="holder-name">FULL NAME</span>
        </div>
        <div class="card-expiration">
          <span>Expires:</span>
          <span class="expiration-date">MM/YY</span>
        </div>
      </div>
    </div>

    <form id="card-form">
      <label for="card-number">Card Number</label>
      <input type="text" id="card-number" maxlength="19" placeholder="#### #### #### ####" required />

      <label for="card-holder">Card Holder</label>
      <input type="text" id="card-holder" placeholder="Full Name" required />

      <div class="form-row">
        <div>
          <label for="expiration-month">Expiration Date</label>
          <select id="expiration-month" required>
            <option value="" disabled selected>Month</option>
            <option value="01">01</option>
            <option value="02">02</option>
            <option value="03">03</option>
            <option value="04">04</option>
            <option value="05">05</option>
            <option value="06">06</option>
            <option value="07">07</option>
            <option value="08">08</option>
            <option value="09">09</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
          </select>
          <select id="expiration-year" required>
            <option value="" disabled selected>Year</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
          </select>
        </div>
        <div>
          <label for="cvv">CVV</label>
          <input type="text" id="cvv" maxlength="3" placeholder="CVV" required />
        </div>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>
  <script src="tarjeta.js"></script>
</body>
</html>
