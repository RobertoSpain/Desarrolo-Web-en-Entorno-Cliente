<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráficos con Google Charts</title>
  <link rel="stylesheet" href="Grafica.css">
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript" src="Grafica.css" defer></script>
</head>
<body>
  <h1>Gráficos con Google Charts</h1>
  
  <!-- Gráfico de barras (Representación en el Congreso de los Diputados) -->
  <div id="barchart" class="chart"></div>

  <!-- Gráfico de sectores (Representación en el Congreso de los Diputados) -->
  <div id="piechart" class="chart"></div>

  <!-- Gráfico geográfico (Ranking de países más turísticos) -->
  <div id="geochart" class="chart"></div>
<script src="Grafica.js"></script>
</body>
</html>
